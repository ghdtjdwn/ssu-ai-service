name: CI

on:
  push:
    branches: [main]
    # Ignore ArgoCD Image Updater write-back commits (deploy/charts/*/values.yaml)
    # and docs so they never rebuild the image. Without this the write-back would
    # loop forever: write-back -> CI -> new image -> write-back -> ...
    paths-ignore:
      - 'deploy/**'
      - 'docs/**'
      - '**.md'
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements-dev.txt
      - name: Run tests
        run: pytest -q

  docker:
    name: Image (ghcr.io, ARM64)
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # The prod node is ARM64 (Ampere A1), so build for linux/arm64 like ssuMCP/ssuAgent.
      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          platforms: arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/ssu-ai-service
          # sha-<full-40-hex> is what the ArgoCD Image Updater allow-tags regexp pins to;
          # latest keeps the values.yaml placeholder pullable on the first sync.
          tags: |
            type=sha,format=long
            type=raw,value=latest
      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
