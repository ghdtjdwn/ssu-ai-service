name: CI

on:
  push:
    branches: [main]
    # Ignore ArgoCD Image Updater write-back commits (deploy/charts/*/values.yaml)
    # and docs so they never rebuild the image. Without this the write-back would
    # loop forever: write-back -> CI -> new image -> write-back -> ...
    paths-ignore:
      - 'deploy/**'
      - 'docs/**'
      - '**.md'
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements-dev.txt
      - name: Run tests
        run: pytest -q

  docker:
    name: Image (ghcr.io, ARM64)
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # The prod node is ARM64 (Ampere A1), so build for linux/arm64 like ssuMCP/ssuAgent.
      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/ssu-ai-service
          # sha-<full-40-hex> is what the ArgoCD Image Updater allow-tags regexp pins to;
          # latest keeps the values.yaml placeholder pullable on the first sync.
          tags: |
            type=sha,format=long
            type=raw,value=latest
      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
