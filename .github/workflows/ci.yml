name: CI

on:
  push:
    branches: [main]
    # Ignore ArgoCD Image Updater write-back commits (deploy/charts/*/values.yaml)
    # and docs so they never rebuild the image. Without this the write-back would
    # loop forever: write-back -> CI -> new image -> write-back -> ...
    paths-ignore:
      - 'deploy/**'
      - 'docs/**'
      - '**.md'
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements-dev.txt
      - name: Run tests
        run: pytest -q

  docker:
    name: Image (ghcr.io, ARM64)
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      # The prod node is ARM64 (Ampere A1), so build for linux/arm64 like ssuMCP/ssuAgent.
      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ssu-ai-service
          # sha-<full-40-hex> is what the ArgoCD Image Updater allow-tags regexp pins to;
          # latest keeps the values.yaml placeholder pullable on the first sync.
          tags: |
            type=sha,format=long
            type=raw,value=latest
      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
