namespace: ssuai-prod
replicaCount: 1
image:
  repository: ghcr.io/ghdtjdwn/ssu-ai-service
  # Placeholder tag. ArgoCD Image Updater writes the real sha-<40hex> tag back here
  # (write-back-target: helmvalues:values.yaml). CI also publishes :latest, so this
  # placeholder is pullable on the first sync before the sha write-back lands.
  tag: sha-8c37537248eadf51cf67dd9ee663aa4fcfeb1950
  pullPolicy: Always
nameOverride: ""
fullnameOverride: ""
# Non-secret request-protection settings. Keep these positive integers: invalid values
# make /ready fail closed while the process remains live for diagnosis.
env:
  SSUAI_MAX_TEXT_LENGTH: "8000"
  SSUAI_RATE_LIMIT_REQUESTS: "60"
  SSUAI_RATE_LIMIT_WINDOW_SECONDS: "60"
  SSUAI_MAX_CONCURRENT_REQUESTS: "4"
secretRef:
  enabled: true
  name: ssu-ai-service-secrets
  optional: false
secretTemplate:
  enabled: false
  stringData:
    SSUAI_GEMINI_API_KEY: "<replace-me>"
    SSUAI_SERVICE_API_KEY: "<replace-me>"
service:
  type: ClusterIP
  port: 8000
ingress:
  enabled: true
  className: traefik
  host: ssu-ai-service.duckdns.org
  tlsSecretName: ssu-ai-service-duckdns-org-tls
  clusterIssuer: letsencrypt-prod
  middlewares:
    redirectHttps: redirect-https
    hsts: hsts
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
probes:
  readiness:
    path: /ready
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 5
# The multi-stage Dockerfile uses a digest-pinned Python 3.11 Alpine image and
# copies them to /usr/local, then runs uvicorn as the non-root `app` user (USER app),
# so runAsNonRoot is enforced here.
containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
    - ALL
podSecurityContext:
  terminationGracePeriodSeconds: 30
  seccompProfile:
    type: RuntimeDefault
