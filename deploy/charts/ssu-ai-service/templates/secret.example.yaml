# Copy this to create the actual k8s secret (DO NOT commit real values):
#
# kubectl create secret generic ssu-ai-service-secrets \
#   --namespace ssuai-prod \
#   --from-literal=SSUAI_GEMINI_API_KEY=<gemini-api-key> \
#   --from-literal=SSUAI_SERVICE_API_KEY=<inbound-gate-key>
#
# SSUAI_GEMINI_API_KEY is the SAME upstream Gemini key stored in ssuai-backend-secrets
#   (the app forwards it to Gemini as an Authorization: Bearer header).
# SSUAI_SERVICE_API_KEY is a NEW inbound credential callers present as X-API-Key. It is
#   fail-closed: if unset, /v1/embeddings returns 401 for everyone.
#
# secretTemplate.enabled stays false so this file renders nothing by default; the secret
# is created out-of-band with the command above. Flip it to true only for local/dev
# clusters where committing placeholder values is acceptable.
{{- if .Values.secretTemplate.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secretRef.name }}
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  {{- toYaml .Values.secretTemplate.stringData | nindent 2 }}
{{- end }}
