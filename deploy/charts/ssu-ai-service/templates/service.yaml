apiVersion: v1
kind: Service
metadata:
  name: {{ include "ssu-ai-service.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ssu-ai-service.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "ssu-ai-service.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
