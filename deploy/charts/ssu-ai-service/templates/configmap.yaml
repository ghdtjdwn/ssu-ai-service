apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ssu-ai-service.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ssu-ai-service.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
data:
  {{- toYaml .Values.env | nindent 2 }}
